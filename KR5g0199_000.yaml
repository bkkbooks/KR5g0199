  text: 上清洞天三五金剛玄籙儀經集七係清玄無極真上元始天尊長明金真玉署治左清真元氣九萬九千九百九十九重流明玉天真人右積陽真精元氣八萬八千八百八十八重金光寳耀真人中玄生靈清妙無鞅真氣百千萬重玉玄金元真人都領上景清虛生神妙氣九億九萬九千九百九十九重氣三十六洞天至真空玄丈人臣某今領髙上天寳玉皇三十六治都監十方飛天神王緫司九天三元八極上下周廻四象下統萬靈普告十方無窮諸天靈官三界六道一切鬼神衆司等臣某今奉受髙上上元元始洞天金剛三五九天元籙即日依法宣行傳授十方天人今有男女生某體素丹質心慕清真投詞自誓求受上元洞天金剛三五元籙即依科加署天剛將軍兵士天官將吏位號一依無極大道元始太上髙上玉皇無上至真大聖十方太上道君三天太上老君九天太上丈人無上空玄太上玉晨君金闕玉帝陛下即日授付元籙所部上元洞天金剛三五九天元真將軍兵士天官將吏各依品數位次度某身安鎮三元上中下部金堂玉府闕節五城宫室羅列天儀羽儀室儀神儀鳳儀營某身左轉九億萬重衛某身右轉九億萬重出入逰行天剛即制御十方攝召天神地祇八極萬靈并五嶽名山大澤三河四海江河淮濟四瀆九域郷亭鬼主九州符廟里社虛空無極無窮無幽無冥無上無下洞淵清虛水府一切神祇皆當奉承符命天官統御即防某身𨼆某形藏其景若有㐫神惡鬼六天雲中逰獵精靈妖魅魍魎欲来傷害某身者天剛當齊功震天動地威風蕩滅不得有違急急如髙上太上玉皇律令洞天玄剛乗騎十億萬衆兵士洞靈赤天剛騎十億萬衆兵士洞天玄剛驛騎十億萬衆兵士洞靈赤天飛剛騎吏十億萬衆兵士洞天上眞剛乗騎十億萬衆兵士洞靈赤天飛真剛騎吏十億萬衆兵士洞天上明剛乗騎十億萬衆兵士洞靈赤天飛仙剛騎吏十億萬衆洞天上玄剛乗騎十億萬衆兵士洞靈赤天飛行剛騎吏十億萬衆洞天元虛剛乗騎十億萬衆兵士洞靈赤天飛飄剛騎吏十億萬衆洞天元氣剛乗騎十億萬衆兵士洞靈赤天伏氣剛騎吏十億萬衆洞天七元剛乗騎十億萬衆兵士洞仙赤天歴地消邪剛騎吏十億萬衆洞天飜天剛乗騎十億萬衆兵士洞仙赤天名殺剛騎吏十億萬衆洞天覆地剛乗騎十億萬衆兵士洞仙赤天覆剛騎吏十億萬衆洞天執録剛乗騎十億萬衆兵士洞仙赤天消惡剛騎吏十億萬衆洞天列宿剛乗騎十億萬衆兵士洞仙赤天飛行列星剛騎吏十億萬衆洞天廻命剛乗騎十億衆兵士洞仙赤天度筭剛騎吏十億萬衆洞天北玄剛乗騎十億萬衆兵士洞仙赤天東方七宿都星剛騎吏十億萬衆洞天東玄剛乗騎十億萬衆兵士洞仙赤天南方七宿都星剛騎吏十億萬衆洞天南玄剛乗騎十億萬衆兵士洞仙赤天西方七宿都星剛騎吏十億萬衆洞天西玄剛乗騎十億萬衆兵士洞仙赤天北方七宿都星剛騎吏十億萬衆洞天中玄剛乗騎十億萬衆兵士洞仙赤天都星剛騎吏十億萬衆洞天中星剛乗騎十億萬衆兵士飛剛驛騎吏三十六億萬衆元命五氣剛乗騎百億萬衆兵士飛剛歴旗驛龍騎吏三十六億萬衆元命九氣剛乗騎百億萬衆兵士飛剛琁璣騎吏三十億萬衆兵士元命七氣剛乗騎百億萬衆兵士飛剛大殺騎吏力士三十六億萬衆元命三氣剛乗騎百億萬衆兵士飛剛大營騎吏力士三十六億萬衆元命四氣剛乗騎百億萬衆兵士飛剛力士騎吏三十六億萬衆上元剛乗騎百億萬衆兵士歴天金剛逰天力士三十二億萬衆上元剛乗騎百億萬衆兵士歴天金剛逰天力士三十二億萬衆上元剛乗騎玉晨君百億萬衆兵士歴天虎貴察姦鉤騎力士三十六萬衆洞元三五擊伐剛乗騎百億萬衆太上明真飛剛天丁力士三十五萬衆洞元三五擊剌剛乗騎百億萬衆太上明真飛剛金剛童子力士三十五萬衆洞元三五斗剛乗騎百億萬衆太上明真飛剛八神力士三十五萬衆元洞九天破殺剛乗騎百億萬衆太上陽神八殺君吏力士三十六萬衆元洞九天剛魅剛乗騎百億萬衆太上陽神斗加剛君吏力士三十六萬衆元洞九天剛魁騎百億萬衆兵士太上陽神捕鬼剛君吏力士三十六萬衆上元歴天十方都監大將軍一人兵士百億萬人上元根天十方都督大將軍一人兵士十億萬人上元生剛營天大將軍一人君吏九十億萬人上元生剛制天大將軍一人君吏九十億萬人上元飛天十方生剛大將軍一人君吏九億萬人上元九天下元八極生剛大將軍一人君吏九億萬人上元九天上府三輔生剛大將軍一人君吏九十億萬人九元九天三台大將軍一人君吏九十億萬人九元三天三台火剛將軍一人君吏九十億萬人上元三十二天三台大將軍一人君吏九十億萬人上元攝召十方三台洞陽大將軍一人君吏九十億萬人上元緫御天地三台洞隂大將軍一人君吏九十億萬人上元洞剛大將軍一人君吏億千萬人元洞中黄飛剛郎騎力士三十五萬衆兵士太上隂神消害剛君吏一人官將百億萬衆元洞中黄飛剛天騶甲卒力士乗騎三十五萬衆兵士太上隂神羅身剛吏一人官將百億萬衆元洞中黄飛剛滅偽力士仙騎三十五萬衆兵士太上隂神藏形玉影剛君吏一人官將百億萬衆元洞中黄飛剛安身仙騎三十五萬衆兵士太上隂神覆形剛君吏一人官將百億萬衆无上三天飛仙剛騎三十五萬衆兵士太上隂陽伏禍却灾剛加君吏一人官將百億萬衆无上三天飛仙執録剛騎三十五萬衆兵士太上隂陽收氣食氣剛加君吏官將百億萬衆无上三天飛仙收惡剛騎三十五萬衆兵士太上隂陽收毒食毒剛加君吏官將百億萬衆无上三天飛仙萬福剛騎三十五萬衆兵士太上隂陽收神食神剛加君吏官將百億萬衆无上三天飛仙防身剛