  text: 巳後符並朱書髙上无上元始太上洞天飛无玄虚玉都左輔上元九天金剛三五大威横越平天大將軍緫制八極髙功車騎葛浩靈字文始身長三千萬丈督護九天軍兵馬力士將吏都軍事領陣億萬億萬乗騎排天羽儀無鞅之衆周備十方營天制地飛行九綱威風震烈掃除六天防灾保刼消灾滅禍逰歴天地執御天璣明理運數扶命三元鎮常五行三界司迎某今奉受真形玄符法鎮於人左宫青華玉闕天璣九關常主九天生靈之運玄玄光下映日月同成流明輝電洞煥某形金剛乗騎大官兵士將吏皆守備某身周帀百億千萬重出即神功彌天蓋地光威煥空藏即寂然定光某身自髙上九天以下莫不歸降通随某身逰鋒履刄水火三灾九厄莫敢當三界神官迎送以某共登皇庭金闕玉帝陛下飛剛歩紀除天灾滅羣㐫斬惡神龍虎逰戯攝召羣非朱鳥翔儛九魔崩摧玄武廵虚妖精檢形將軍扶天理運助國輔時制灾九元三光七曜琁璣玉衡五方玄斗布列某形髙上无上元始太上左輔三五主東方南方十四宿陽斗陽神陽氣通天通地鎮上上太一生神部九十九萬人治肝府无上玄老生神部八十八萬人治心府即安鎮洞天左宫二方臨蓋天元急急一如元始太上律令金甲朱衣緑帶髙上无上元始太上洞天飛元虚无上都右弼上元九天元剛三五廣威横天大將軍緫制八方髙晨車騎唐文昌字金玄身長三千萬丈都督三軍兵馬力士將吏都軍陣事領兵億萬乗騎駭空排天雲儀无鞅之衆周備八極檢天制地緫攝三綱飛行震空風馭諸天光烈萬方收魔召神討㐫戮妖斬伐不祥扶命三天某今奉受真形玄符法鎮於人右宫素天七寳之闕金闕之巔常主三天生神之運常朗光日月之宫下映某身營守備衛天億千萬重出流耀電轉洞明某形天剛乗騎天官兵士將吏皆當備滿某身出即彌天蓋地隠即寂處无間定光某身之中自无上三天以下莫不歸伏随某逰山渉水三軍五兵莫不靡伏飛元歩星徐蕩十方野道六天之神虎龍騰躍檢攝魔靈朱鳥振翼百鬼摧鋒玄武躍虚誅滅羣殃將軍扶天制氣助國御運消灾保祚七元三光七曜琁璣玉衡五方星宿布列某形髙上无上元始太上右弼三五主西方北方十四宿生神隂運隂靈隂天隂氣通天通地鎭太一化生神部七十七萬人治肺府玄上太上靈化生神神部五十五萬人治腎府安鎮洞天右宫二方臨蓋天機急急一如元始太上律令髙上无上元始太上洞天飛梵王虚元都中鎮上元九天元剛三五平天正威廣越大將軍督天十方髙上車騎武神都軍周文度字金光身長三千文都領十方飛天軍將兵馬力士將吏神功擊伐事領陣億億萬萬乗騎駭天排空天儀赫烈耀虚九演無鞅之衆備鎮九元營天威攝震動雲營驅除六天檢攝北酆制御萬靈執戈天兵召制三界羣魔百精建節鬼帝截滅姦㐫聞偽即討聞妖即誅聞邪即戮聞善即護聞正即遷聞真即衛聞福即防聞禍即消聞吉即保聞㐫即除是以扶命天地某今奉受真形玄符法鎮人之三元太㣲玉府中皇之宫金闕五城九晨之堂常主天地生神明運匡正琁璣左日右月飛耀照空火甲前陣毒兵後從左列武士青龍萬重右列神將白虎天衝朱鳥靈禽吐火嘯風句陳玄武食鬼食㐫左侍横天力士斬捕姦妖右侍金剛力士吞邪食鬼流明炎電敢有不祥出即威風蕩穢掃塵營天制地彌蓋太空隠即太寂細㣲之中定立天地悉由神功今鎮某身三元之中自天上天下地上地下莫不歸𨽻某若逰行山丘廣野江河四海八極九州一切神祇鬼王土地符廟里神真官注氣咸當奉符承命也將軍明理三元正氣輔國扶命天地通運四時五行用化九天三元七曜琁璣玉衡諸天日月星宿三綱六紀布列一切光明大神皆列在某形髙上無上无始太上太㣲玉虚中皇上元上府主三元九府太一元精生神之運通元通始法鎮九天上元部十二億萬人治脾府太上元皇清真靈運之首一如元始太上律令某年號太嵗某月某朔某日子時某郡縣郷里男官女官臣姓名某年若干嵗奉受髙上上元元始洞天三五金剛玄籙於某郡縣里中登壇付度上元洞天金剛三五䇿板杖等儀揚州社君鄒混冀州社君馮遷豫州社君范祀荆州社君張象兖州社君費萌徐州社君賈萌雍州社君盛季青州社君韓育梁州社君楊謙元始老君勑天地水三官山川五嶽崑崙九土日月五星二十八宿九星七曜三十六慧琁磯玉衡五斗真人百億衆神咸當奉承衛命某身攝魔收鬼殺邪滅惡九土社界急行驛傳急急如律令太𡻕某年某月某日角星亢星氐星房星心星尾星箕星斗星牛星女星虚星危星室星璧星奎星婁星胃星昴星畢星觜星參星井星鬼星柳星星星張星翼星軫星靈天三十二度天剛驛呈二十八宿營護某身三五飛剛召鬼㓕兵九州真官從某奉行得道之日飛昇玉清齊功真形急急如律令某郡縣郷里男官女官生某年若干嵗奉受右某郡縣書极下后三五板中五符并轉板符悉用朱書佩之板上真人姓王名无字赤緫領五斗真人身長三丈五尺腰帶二十八宿星名足躡三綱六紀緫司九州里社姓名如右三五板杖等印文付度三五章奏出官儀次鳴天鼔三十六通次發爐清玄无極真上三天玄元始氣无極大道太上老君左后香官飛仙驛龍乗騎捧香使者飛天龍騎五帝侍香玉童玉女等各二十四人出上唘虚无自然元始尊天尊臣今正爾燒香奏表付度法事願得太上十方正真生炁降入臣等身中所唘逕上无極大道至真玉皇御前畢再拜次長跪香案前岀官奏表付度謹岀臣某身中五體真官三五功曹官各二人出上元九天三五元命正一功曹官各二人出上元洞天三五度命功曹官各二人出上元洞天三五消灾度道功曹官各二人出上元洞天三五條檢功曹官各二人出上元洞天三五隂陽治病功曹官各二人出无上上元九天上靈飛天白虎送章仙龍騎吏官各二人出臣某身中所部三五天官將吏衆真使人仙都直真符吏領仙都官使者各二千二百人出嚴裝整服垂纓各整三五諸天羽儀鳯飾羅列雲陣四靣八方營衛臣某左右前後流精耀電光煥太空震威天地掃除不祥玄鑒臣某表奏付度法事今有某郡縣郷里男女生等若干人投詞玄真至心歸命三尊求受上元洞天三五金剛玄籙三將軍真形玄符䇿板杖契等即日書冩列位天官位號依法署籙若上剌即云某時上剌若付度即云某時付度即以某時拜請上元洞天天官付度今重章表上啓无極大道元始太上玉皇无上至真大聖天尊金闕玉帝陛下仙都真官考召行狀都官使者伏願慈真下降玄察垂神監度某等法事皆當依位次度某等身中安宫鎮府周帀營衛左轉九億萬重右轉九億萬重防護某等身命天儀光耀威風十方三五將軍乗騎兵士天官將吏以某形影合同神光洞映内外流明煥儀為是某所履土地諸處真官注氣監察考召諸君吏等共相輔佐當隨功徳賞不負効信所啓逕上无極大道至真玉皇御前畢再拜次奏章章即重勑言奏章功臣某重勑身中所部三五天官衆真功曹將吏兵士都官使者飛天白虎送章仙龍騎吏等臣某向出官言奏章奏事竟所部衆真各廻騰虚駕空還復宫府安鎮本位營天鋪地周備臣某身中百千萬重天官正真各從朱門妙闕而還職位臣某所啓上御无極大道前畢再拜次廻案北向長跪重岀天官竟即付度三五封䇿板杖臣某重勑身中五真郎吏三五功曹左右真官使者三五元命正一功曹上元三五度命功曹三五消灾度道功曹三五開度功曹三五條檢功曹三五隂陽治病功曹三五都剛君吏官各三十五人官將兵士各九十億萬衆出三五金剛使者三五元剛使者三五天剛使者三五諸天日月三光七曜琁璣玉衡七星北斗魁𩲃𩵄䰢魓𩳐魒君吏五斗玄神三五君吏三五周天君吏三五制地君吏十方諸天星宿君吏收神食神君吏收鬼食鬼君吏收邪食邪君吏收毒食毒君吏收精食精君吏收㐫食㐫君吏收氣食氣君吏北度都律君東度都陣君南度都陣君西度都陣君赤陽朱天甲子都官七十二官君陽天丙子三十五官君流明金剛君吏列天剛君吏羅天剛君吏營天剛君吏制天歴地剛君吏三五生剛君吏三元九天元剛君吏三氣君吏五氣君吏九氣君吏二十四官君吏隂陽水火君吏上元三十六洞天元陽上府都官官君吏三五都監神剛使者都剛飛天乗騎直真符吏太一玄府開度仙都玉郎飛行羽騎八十四萬剛君等名將天官乗騎兵士天官將吏各九億萬衆岀各各嚴裝整服天儀羽飾彌天蓋地排陣雲營威風十方列侍虗庭方位八極御制天地攝召三官流精耀電掃蕩不祥左右營衛四靣并勑天地五嶽三河四瀆淮濟江河九州土地之主真官注氣皆共監盟依法領押監察羅列付度某等所受上元洞天三五金剛玄籙三將軍真形玄符䇿板杖契等分明列度鎮某三元關節官府五城内外周備各九千萬重勿令錯誤營衛某等以衆真合同臣今所啓迳上无極大道至真玉皇御前畢再拜次分契文今日以某畫一分一法天一法地一法人一法誓九天三一以盟九天父母某今指天畫地不負三尊不違三一自分契之後有違有負軽師慢道之日某身以七世歴刼長充風刀水火考罰永失光明畢即畫一分契師得右弟子得左各金鈕貫之也契亦以籙同佩限次度三五符真形勑文先鳴天鼓三十五通畢呪曰玄天蕩蕩玄元清清虚妙運安固刼齡元始開真正道流明營天制地十方駭驚神功攝召萬帝束形周蓋四象風火敢停威震六天野道不生玄符勑到役剛使兵收邪斬妖魔界盡平流金激電酆都摧崩急急如律令次勑板文先鳴天鼔二十四通畢咒曰上元符命檢威十方天地奉勑䇿召神王三界司官莫不束形九土真官以某合并逰山渉海山神水帝皆來送迎傳告五帝保某刼齡諸天星宿自相輔營急急一如律令次勑䇿板文先鳴天鼓二十四通畢咒曰玄映流曜五方神功䇿天天開䇿地地通䇿山神束䇿水降龍䇿火火滅䇿神神迎䇿鬼鬼倒䇿妖妖亡廻轉十方萬靈保當佩䇿之後任適五常形神鎮守萬刼無傷急急一如律令次勑度氣水文先鳴天鼓三十五通咒曰太上碧津三氣生流液九元三五靈五氣化神朱天河丹水湧出天剛羅玄靈九氣月化飛二十四神各有威萬氣所宗鬰峩巍三剛所攝鎮九㣲靈生逐水守關機營神保氣防外非歴刼長存常相追急急一如律令竟授水以弟子唼水三口止付度畢即長跪次内官言功臣某上啓无極大道元始太上至真大聖天尊向所岀臣某身中五真郎吏三五功曹左右真官三剛君吏諸天日月三光七曜琁璣玉衡七真魁𩲃𩵄䰢魓𩳐魒君吏為是三五所部將軍乗騎兵士天官將吏十方諸天羽儀監察考召真官將吏等今付度某法事巳竟請舉遷言功各當加真髙位品上天爵帝秩萬重齊功五帝皆如金簡功賞受遷事畢各廻靈駕排陣天儀騰虚乗空還復玄宫金堂玉府周鎮三元並加仙位須後召復出臣某所付度某等上元洞天三五金剛玄籙三將軍真形玄符䇿板杖契等從今以去佩帶常相鎮守彌齡歴刼永為身寳臣某啓奏上簡无極大道至真玉皇御前畢再拜次復爐竟便岀左右香官飛仙驛龍乗騎捧香使者飛天龍騎等當使靈壇上生自然金暉寳曜玄映玉瑛金液之精使某受道福慶自在天下受恩十方玉童玉女侍衛香煙逕奏臣某所啓无極至真玉皇御前畢即出也按詞文某郡縣郷里男女生某年若干𡻕月日生右若干人今投詞請受上元洞天三五金剛玄籙三將軍真形符圖䇿板杖契等請給謹狀受三五符儀信物金鈕一雙絳紋三十五尺朱砂七兩木香十斤清玄无極正一玄氣係天師某治炁如法臣某稽首再拜髙上真威正氣謹按玄科今有男女生某等先䝉師真啓㧞賜署天官治職佩荷非分之恩實衘罔極无量慈澤但某生長濁世命處三灾形染十惡習以性成負越禁誡罪滿虚空自罹咎舋無功可謝若非天慈何由濟度伏聞大道慈真普弘恩備十方開度蒼生法橋濟苦无物不備澤潤三界恩霑六道某等謹以投詞至心玄真歸命三尊乞見授度上元洞天三五金剛玄籙三將軍真形玄符䇿板杖契等永濟某等長河之苦佩法之後當依科奉行不敢有違禁約即依某詞如法加署天官謹依某等郡縣郷里姓名年幾即日逆剌上言章奏天官位號如前事狀伏願无極大道无上金闕玉帝至真大聖降勑上元九天仙都署仙玉郎九天真王監真度命使者攝召天官分别正位尅以今月某日付度某等依法拜署謁言上剌奏御无極大道御前臣某誠惶誠恐死罪死罪𥟵首再拜白剌上詣太无上元九天金闕玉帝考召清真正氣太𡻕某月某日子時臣某扵某郡縣郷里白剌太玄上九天无上真明大衆至真降遣度三五章儀清玄无極正一玄氣係天師治炁如法臣某𥟵首再拜髙上真威正氣謹按玄科今有男女某等若干人投詞𥟵顙求受上元洞天三五金剛玄籙三將軍真形玄符䇿板杖契等臣某以今月某日依科署某等天官列位如前剌表伏願无極大道至真大聖太上天尊垂神玄鍳慈真降下開度某等永為身寳願勑九天髙上玉皇監真使者玄都仙王監盟玉郎使者十方飛天開度玉司神仙羽郎使者三五開度使者无上三天金闕玉帝消灾度道真公使者一合來下天真乗騎彌天蓋地流精電轉流明晃焴掃蕩六天群非攝召三界神官共下監臨開度某等法事條例付度永鎮某等身中無令失冷臣某伏地拜上𥿄章一通恩惟无極大道无上金闕玉帝至真大聖哀愍臣某所表随事分别清真玄氣生靈神妙之功天真官属付度某等常當營衛流光電耀布在宫室鎮守三元謹因直真符吏飛龍乗騎飛天玉郎送章飛真白虎神龍騎吏等各千二百人驛傳章文上奏无上至真玉帝御前臣某誠惶誠恐死罪死罪稽首再拜以聞臣姓某属某宫觀住持太清如法太嵗年月日子時扵某里拜上右朱書章文剌亦如法泰玄正真玄元清玄无極真上天君真明元君无上三天君太上大道君億千萬重真玄生氣道君太上丈人九老仙都君百千萬重氣君真天陛下右取此用新降泰清如前上清洞天三五金剛玄籙儀經
